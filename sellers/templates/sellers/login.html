{% extends "sellers/base.html" %}
{% block title %}Login — Subdivision Market{% endblock %}
{% block content %}
<div class="row justify-content-center" style="margin-top: 10vh;">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4 border-0 shadow-sm">
      <div class="text-center mb-4">
        <div style="width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg, #f97316, #ea580c); display: flex; align-items: center; justify-content: center; margin: 0 auto;">
          <i class="bi bi-shop text-white" style="font-size: 1.5rem;"></i>
        </div>
        <h4 class="heading-font mt-3 mb-1">Seller Login</h4>
        <p class="text-muted small">Sign in to manage your store</p>
      </div>
      <form method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}
        <div class="alert alert-danger py-2 small border-0">{{ form.non_field_errors }}</div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label small fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-orange w-100 py-2 fw-semibold">Sign In</button>
      </form>
      <p class="text-center text-muted small mt-4 mb-0">
        <i class="bi bi-shop me-1"></i> Subdivision Market
      </p>
    </div>
  </div>
</div>
{% endblock %}
